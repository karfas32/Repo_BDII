<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — UPLA</title>
  <!-- Hoja de estilos externa (sin CSS embebido) -->
  <link rel="stylesheet" href="styles.css">
  <!-- Animación extra para el error shake -->
  <style>
    @keyframes shakeX {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabase-config.js"></script>

<script src="admin.js"></script>
<script src="tema.js"></script>

  <!-- ══════════════════════════════════════════════════════
       PÁGINA DE LOGIN
       Permite acceder al sistema con rol usuario o admin
  ══════════════════════════════════════════════════════ -->
  <div class="login-page">

    <!-- Botón de tema flotante en login -->
    <button
      id="btnTema"
      class="btn-tema btn-tema-flotante"
      onclick="toggleTema()"
      aria-label="Cambiar tema claro u oscuro"
      title="Cambiar tema"
    ><span id="iconTema">☀️</span></button>

    <div class="login-container">

      <!-- Logo e identidad UPLA -->
      <div class="login-logo-area">
        <!-- Imagen del logo: coloca lg_upla.img en la raíz del proyecto -->
        <img src="lg_upla.png" alt="Logo UPLA"
             style="width:70px; height:70px; object-fit:contain; margin:0 auto 1rem; display:block;"
             onerror="this.style.display='none'; document.getElementById('loginLogoFallback').style.display='flex';">
        <!-- Fallback si la imagen no carga -->
        <div id="loginLogoFallback" class="login-logo" style="display:none;">U</div>
        <div class="login-logo-title">Base de Datos II</div>
        <div class="login-logo-sub">Universidad Peruana Los Andes · UPLA</div>
      </div>

      <!-- Tarjeta de login -->
      <div class="login-card">
        <h1 class="login-title">Bienvenido</h1>
        <p class="login-subtitle">Ingresa tus credenciales para continuar</p>

        <!-- Alerta de error / éxito (oculta por defecto) -->
        <div id="alertError" class="alert alert-error hidden" role="alert"></div>

        <!-- Formulario de autenticación -->
        <!-- El JS externo (login.js) maneja el evento submit -->
        <form id="loginForm" novalidate>

          <!-- Campo: usuario -->
          <div class="form-group">
            <label for="inputUsuario" class="form-label">Usuario</label>
            <input
              type="text"
              id="inputUsuario"
              class="form-input"
              placeholder="Ingresa tu usuario"
              autocomplete="username"
              required
            >
          </div>

          <!-- Campo: contraseña -->
          <div class="form-group">
            <label for="inputPassword" class="form-label">Contraseña</label>
            <div style="position:relative;">
              <input
                type="password"
                id="inputPassword"
                class="form-input"
                placeholder="Ingresa tu contraseña"
                autocomplete="current-password"
                style="padding-right: 46px;"
                required
              >
              <!-- Botón mostrar/ocultar contraseña -->
              <button
                type="button"
                id="togglePass"
                style="
                  position: absolute;
                  right: 12px;
                  top: 50%;
                  transform: translateY(-50%);
                  background: none;
                  border: none;
                  cursor: pointer;
                  font-size: 1rem;
                  line-height: 1;
                  color: var(--text-muted);
                "
                aria-label="Mostrar u ocultar contraseña"
              >👁️</button>
            </div>
          </div>

          <!-- Botón de envío -->
          <button type="submit" id="btnLogin" class="btn btn-primary btn-full btn-lg">
            Iniciar Sesión
          </button>

        </form>

        <!-- Separador -->
        <div class="divider"></div>

        <!-- Info de credenciales de demostración -->
        <div class="demo-info">
          <p><strong>🔐 Credenciales de demo:</strong></p>
          <p><strong>Admin:</strong> usuario: <code>admin</code> | contraseña: <code>upla2024</code></p>
          <!--<p><strong>Estudiante:</strong> usuario: <code>estudiante</code> | contraseña: <code>123456</code></p>-->
        </div>

        <!-- Link para ir al portal sin login -->
        <p style="text-align:center; margin-top:1.2rem; font-size:0.82rem; color:var(--text-muted);">
          ¿Solo quieres ver el contenido?
          <a href="index.html">Ir al portal →</a>
        </p>

      </div>
    </div>

  </div>

  <!-- Script de login (archivo externo, sin JS en HTML) -->
  <script src="login.js"></script>
  <!-- Script de tema compartido -->
  <script src="tema.js"></script>
</body>
</html>
