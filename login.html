<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — UPLA</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    @keyframes shakeX {

      0%,
      100% {
        transform: translateX(0);
      }

      20%,
      60% {
        transform: translateX(-8px);
      }

      40%,
      80% {
        transform: translateX(8px);
      }
    }
  </style>
</head>

<body>

  <!-- ══════════════════════════════════════════════════════
       PÁGINA DE LOGIN
  ══════════════════════════════════════════════════════ -->
  <div class="login-page">

    <button id="btnTema" class="btn-tema btn-tema-flotante" onclick="toggleTema()" aria-label="Cambiar tema"
      title="Cambiar tema">
      <span id="iconTema">☀️</span>
    </button>

    <div class="login-container">

      <div class="login-logo-area">
        <img src="lg_upla.png" alt="Logo UPLA"
          style="width:70px; height:70px; object-fit:contain; margin:0 auto 1rem; display:block;"
          onerror="this.style.display='none'; document.getElementById('loginLogoFallback').style.display='flex';">
        <div id="loginLogoFallback" class="login-logo" style="display:none;">U</div>
        <div class="login-logo-title">Base de Datos II</div>
        <div class="login-logo-sub">Universidad Peruana Los Andes · UPLA</div>
      </div>

      <div class="login-card">
        <h1 class="login-title">Bienvenido</h1>
        <p class="login-subtitle">Ingresa tus credenciales para continuar</p>

        <div id="alertError" class="alert alert-error hidden" role="alert"></div>

        <form id="loginForm" novalidate>

          <div class="form-group">
            <label for="inputUsuario" class="form-label">Usuario</label>
            <input type="text" id="inputUsuario" class="form-input" placeholder="Ingresa tu usuario"
              autocomplete="username" required>
          </div>

          <div class="form-group">
            <label for="inputPassword" class="form-label">Contraseña</label>
            <div style="position:relative;">
              <input type="password" id="inputPassword" class="form-input" placeholder="Ingresa tu contraseña"
                autocomplete="current-password" style="padding-right: 46px;" required>
              <button type="button" id="togglePass"
                style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1rem; line-height: 1; color: var(--text-muted);"
                aria-label="Mostrar u ocultar contraseña">👁️</button>
            </div>
          </div>

          <button type="submit" id="btnLogin" class="btn btn-primary btn-full btn-lg">Iniciar Sesión</button>

        </form>

        <div class="divider"></div>

        <div class="demo-info">
          <p><strong>🔐 Credenciales de demo:</strong></p>
          <p><strong>Admin:</strong> usuario: <code>admin</code> | contraseña: <code>upla2024</code></p>
          <p><strong>Estudiante:</strong> usuario: <code>estudiante</code> | contraseña: <code>123456</code></p>
        </div>

        <p style="text-align:center; margin-top:1.2rem; font-size:0.82rem; color:var(--text-muted);">
          ¿Solo quieres ver el contenido?
          <a href="index.html">Ir al portal →</a>
        </p>

      </div>
    </div>

  </div>

  <!-- ══════════════════════════════════════════════════════
       SCRIPTS (cargados una sola vez)
  ══════════════════════════════════════════════════════ -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="tema.js"></script>
  <script src="login.js"></script>

</body>
<!-- Al final del body, justo antes de cerrar </body> -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="tema.js"></script>
<script src="login.js"></script>

</html>
